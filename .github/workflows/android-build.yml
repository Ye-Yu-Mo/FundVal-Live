name: Build Android App

on:
  push:
    branches:
      - main
    paths:
      - 'fundval-app/**'
      - 'frontend/android/**'
      - 'frontend/src/**'
      - 'frontend/package.json'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'fundval-app/**'
      - 'frontend/android/**'
      - 'frontend/src/**'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:
  # ── 调试 APK ──────────────────────────────
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: fundval-app
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fundval-debug
          path: fundval-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ── 测试 ────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        working-directory: fundval-app
        run: ./gradlew test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: fundval-app/app/build/reports/tests/
          retention-days: 7

  # ── Release AAB（仅 tag 触发）────────────────
  build-release:
    name: Release AAB
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > fundval-app/release.keystore

      - name: Build release AAB
        working-directory: fundval-app
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH || 'release.keystore' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'fundval' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_PASSWORD" ]; then
            ./gradlew bundleRelease \
              -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
              -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD
          else
            echo "::warning::No signing config found, building unsigned AAB"
            ./gradlew bundleRelease
          fi

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: fundval-release
          path: fundval-app/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90
